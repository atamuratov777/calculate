<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Простой калькулятор</title>
    <!-- Подключаем внешние стили CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">
        <h2>Калькулятор</h2>
        <!-- Ввод первого числа -->
        <input type="number" id="num1" placeholder="Число 1">
        
        <!-- Выбор операции -->
        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>
        
        <!-- Ввод второго числа -->
        <input type="number" id="num2" placeholder="Число 2">
        
        <!-- Кнопка запуска -->
        <button onclick="calc()">Посчитать</button>
        
        <!-- Место для вывода ответа -->
        <div id="result">Результат: </div>
    </div>

    <!-- Подключаем логику JavaScript -->
    <script src="script.js"></script>
</body>
</html>
